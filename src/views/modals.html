    <!-- 게임 종료 모달 -->
    <div id="endgame-modal" class="overlay hidden">
      <div class="lobby-card game-card" style="text-align: center; max-width: 540px; width: 90vw;">
        <h1 id="endgame-title">게임 종료!</h1>
        <h2 id="endgame-winner" style="color: #f1c40f; margin: 15px 0 20px 0; font-size: 2rem;">P1 승리!</h2>
        
        <div id="endgame-scores-container" class="endgame-scores-container" style="margin: 15px 0 25px 0; display: flex; flex-direction: column; gap: 10px;">
          <!-- JS에서 동적 렌더링 -->
        </div>
        
        <button id="btn-return-lobby" class="game-btn">로비로 돌아가기</button>
      </div>
    </div>

    <!-- 증강 상세 정보 모달 (추가 가능) -->
    <div id="augment-detail-modal" class="overlay hidden">
      <div class="lobby-card game-card">
        <!-- 구현 대기 -->
      </div>
    </div>

    <!-- 프로필 이미지 크롭 모달 -->
    <div id="crop-modal" class="overlay hidden">
      <div class="lobby-card game-card" style="width: 500px; max-width: 90vw; text-align: center;">
        <h2>프로필 이미지 설정</h2>
        
        <div id="crop-input-section" style="margin-top: 20px;">
          <p style="margin-bottom: 10px;">적용할 이미지 링크(URL)를 입력해주세요.</p>
          <input type="text" id="crop-image-url" class="game-input" placeholder="https://example.com/image.jpg" style="width: 100%; margin-bottom: 20px;" />
          <button id="btn-crop-load" class="game-btn">불러오기</button>
          <button id="btn-crop-cancel1" class="game-btn btn-login-secondary" style="margin-left: 10px;">취소</button>
        </div>

        <div id="crop-edit-section" class="hidden" style="margin-top: 20px;">
          <div style="width: 100%; height: 300px; background: #333; margin-bottom: 20px;">
            <img id="crop-image-preview" src="" style="max-width: 100%; display: block;" />
          </div>
          <button id="btn-crop-save" class="game-btn">저장 및 적용</button>
          <button id="btn-crop-cancel2" class="game-btn btn-login-secondary" style="margin-left: 10px;">취소</button>
        </div>
      </div>
    </div>

    <!-- 증강 선택 모달 -->
    <div id="augment-selection-modal" class="overlay hidden">
      <div class="lobby-card game-card augment-modal-card">
        <h1 id="augment-modal-title">증강 선택</h1>
        <div style="margin: 10px 0;">
          <span id="augment-timer" class="turn-timer">
            <svg class="hourglass-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 22h14"></path>
              <path d="M5 2h14"></path>
              <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"></path>
              <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"></path>
            </svg>
            <span id="augment-timer-text">30s</span>
          </span>
        </div>
        <p id="augment-modal-desc">원하는 증강을 하나 선택하세요.</p>
        <div id="augment-options" class="augment-options-container">
          <!-- JS에서 동적 생성 -->
        </div>
      </div>
    </div>

    <!-- 디버그 컨테이너 -->
    <div id="debug-container" class="debug-panel">
      <div class="debug-header">
        <span>Debug Tools</span>
        <button id="btn-debug-toggle">▼</button>
      </div>
      <div id="debug-content" class="debug-content">
      </div>
    </div>
