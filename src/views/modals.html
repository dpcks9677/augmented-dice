    <!-- 게임 종료 모달 -->
    <div id="endgame-modal" class="overlay hidden">
      <div class="lobby-card neo-card" style="text-align: center;">
        <h1 id="endgame-title">게임 종료!</h1>
        <div class="score-summary" style="margin: 20px 0; font-size: 1.2rem; line-height: 1.6; display: flex; justify-content: space-around;">
          <div>
            <h3>Player 1</h3>
            <p>기본 점수: <span id="endgame-p1-base">0</span></p>
            <p>증강 보너스: <span id="endgame-p1-bonus" style="color: #27ae60;">0</span></p>
            <p style="font-size: 1.5rem; font-weight: bold; margin-top: 10px;">최종: <strong id="endgame-p1-score">0</strong></p>
          </div>
          <div>
            <h3>Player 2</h3>
            <p>기본 점수: <span id="endgame-p2-base">0</span></p>
            <p>증강 보너스: <span id="endgame-p2-bonus" style="color: #27ae60;">0</span></p>
            <p style="font-size: 1.5rem; font-weight: bold; margin-top: 10px;">최종: <strong id="endgame-p2-score">0</strong></p>
          </div>
        </div>
        <h2 id="endgame-winner" style="color: #f1c40f; margin-bottom: 30px; font-size: 2rem;">P1 승리!</h2>
        <button id="btn-return-lobby" class="neo-btn">로비로 돌아가기</button>
      </div>
    </div>

    <!-- 증강 선택 모달 -->
    <div id="augment-selection-modal" class="overlay hidden">
      <div class="lobby-card neo-card augment-modal-card">
        <h1 id="augment-modal-title">증강 선택</h1>
        <p id="augment-modal-desc">원하는 증강을 하나 선택하세요.</p>
        <div id="augment-options" class="augment-options-container">
          <!-- JS에서 동적 생성 -->
        </div>
      </div>
    </div>

    <!-- 디버그 컨테이너 -->
    <div id="debug-container" class="debug-panel">
      <div class="debug-header">
        <span>Debug Tools</span>
        <button id="btn-debug-toggle">▼</button>
      </div>
      <div id="debug-content" class="debug-content">
      </div>
    </div>
