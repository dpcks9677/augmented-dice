<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>주사위 모델링 뷰어</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #fff;
    }
    #viewer-container {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }
    .ui-panel h2 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      text-align: left;
    }
    button:hover {
      background: #555;
    }
    button.active {
      background: #007bff;
      border-color: #0056b3;
    }
    #dummy-container {
      display: none;
      width: 100px;
      height: 100px;
    }
  </style>
</head>
<body>
  <div id="viewer-container"></div>
  
  <div class="ui-panel">
    <h2>모델링 뷰어</h2>
    <div class="btn-group" id="btn-group">
      <!-- Buttons will be generated by JS -->
    </div>
    <div style="margin-top: 15px; font-size: 0.85rem; color: #ccc;">
      마우스 좌클릭: 회전<br/>
      마우스 휠: 확대/축소<br/>
      마우스 우클릭: 이동
    </div>
  </div>

  <div id="dummy-container"></div>

  <script type="module" src="/src/viewer.js"></script>
</body>
</html>
